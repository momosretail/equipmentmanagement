<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바리스타팀 매장사업부 QA 장비 관리 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
    *, * ::before, * ::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    :root {
        --bg: #f4f2ee;
        --surface: #fff;
        --surface2: #f9f8f5;
        --border: #e0e0dc;
        --border2: #ccc;
        --text: #1a1916;
        --muted: #7a7770;
        --accent: #1a1916;
        --blue: #909288;
        --blue-bg: #f0f0ee;
        --sidebar-w: 220px;
        --r: 8px;
        --sans: 'Noto Sans KR', sans-serif;
        --mono: 'DM Mono', monospace;
    }/* ── Login ── */
    .login-logo {
        width: 120px;
        height: 120px;
        object-fit: contain;
        margin-bottom: 1.5rem;
    }

    .login-field input::placeholder {
        color: rgba(255, 255, 255, .5);
        letter-spacing: .08em;
    }

    .login-field input:focus {
        background: rgba(255, 255, 255, .22);
        border-color: rgba(255, 255, 255, .6);
    }

    body {
        font-family: var(--sans);
        background: #f4f2ee;
        color: var(--text);
        min-height: 100vh;
        display: flex;
    }/* ── Sidebar ── */
    .sidebar {
        width: var(--sidebar-w);
        min-height: 100vh;
        background: #1a1916;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 100;
    }

    .sidebar-logo {
        padding: 1.4rem 1.2rem 1rem;
        border-bottom: 1px solid #7a7870;
    }

    .sidebar-logo .brand {
        font-size: 13px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: .05em;
        line-height: 1.4;
    }

    .sidebar-logo .sub {
        font-size: 12px;
        color: #ddd;
        margin-top: 2px;
    }

    .sidebar-section {
        padding: .75rem 1rem .25rem;
        font-size: 12px;
        color: #ccc;
        letter-spacing: .08em;
        text-transform: uppercase;
    }

    .nav-item {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: .6rem 1.2rem;
        font-size: 13px;
        color: #e8e6e2;
        cursor: pointer;
        transition: all .15s;
        border-left: 3px solid transparent;
    }

    .nav-item:hover {
        background: #ffffff12;
        color: #fff;
    }

    .nav-item.active {
        background: #ffffff18;
        color: #fff;
        border-left-color: #fff;
    }

    .nav-item .nav-icon {
        font-size: 14px;
        width: 18px;
        text-align: left;
    }

    .nav-store {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: .5rem 1.2rem .5rem 1.5rem;
        font-size: 13px;
        color: #e8e6e2;
        cursor: pointer;
        transition: all .15s;
        border-left: 3px solid transparent;
    }

    .nav-store:hover {
        background: #ffffff12;
        color: #fff;
    }

    .nav-store.active {
        color: #fff;
        border-left-color: #fff;
    }

    .nav-store .store-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .sidebar-bottom {
        margin-top: auto;
        padding: 1rem 1.2rem;
        border-top: 1px solid #7a7870;
    }

    .date-small {
        font-size: 10px;
        color: #ccc;
        font-family: var(--mono);
    }

    .logout-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        margin-bottom: .75rem;
        padding: 7px 10px;
        border: 1px solid #7a7870;
        border-radius: 6px;
        background: #ffffff10;
        color: #e8e6e2;
        font-size: 12px;
        font-family: var(--sans);
        cursor: pointer;
        transition: all .15s;
    }

    .logout-btn:hover {
        background: #ffffff18;
        color: #fff;
        border-color: #aaa;
    }/* ── Main ── */
    .main {
        margin-left: var(--sidebar-w);
        flex: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: #f4f2ee;
    }

    .topbar {
        background: #f4f2ee;
        border-bottom: 1px solid #e2dfd8;
        border-bottom: 1px solid var(--border);
        padding: .85rem 1.75rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        position: sticky;
        top: 0;
        z-index: 50;
    }

    .topbar-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
    }

    .topbar-right {
        display: flex;
        gap: 8px;
        align-items: center;
    }

    .date-chip {
        font-size: 11px;
        color: var(--muted);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 4px 12px;
        font-family: var(--mono);
    }

    .refresh-btn {
        font-size: 12px;
        background: #1a1916;
        color: #fff;
        border: none;
        border-radius: 20px;
        padding: 6px 14px;
        cursor: pointer;
    }

    .content {
        padding: 1.25rem 1.5rem 4rem;
        flex: 1;
        background: #f4f2ee;
        overflow-x: hidden;
    }/* ── Summary ── */
    .summary {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 1.75rem;
        min-width: 0;
    }

    .s-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 1.2rem 1.25rem;
        cursor: pointer;
        transition: all .15s;
        user-select: none;
    }

    .s-card:hover {
        border-color: var(--border2);
        box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
    }

    .s-card.active-filter {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent);
    }

    .s-label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 8px;
    }

    .s-num {
        font-size: 34px;
        font-weight: 600;
        font-family: var(--mono);
        line-height: 1;
    }

    .s-card.c-danger .s-num {
        color: #C62828;
    }

    .s-card.c-warn .s-num {
        color: #EF6C00;
    }

    .s-card.c-ok .s-num {
        color: #2E7D32;
    }/* ── Filter panel ── */
    .filter-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 1rem 1.25rem;
        margin-bottom: 1.25rem;
        display: none;
    }

    .filter-panel.open {
        display: block;
    }

    .filter-panel-title {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: .75rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .filter-close {
        font-size: 12px;
        color: var(--muted);
        cursor: pointer;
        background: none;
        border: none;
    }

    .filter-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .filter-item {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        padding: 6px 8px;
        background: var(--bg);
        border-radius: 6px;
    }

    .filter-store-badge {
        font-size: 10px;
        border-radius: 10px;
        padding: 2px 9px;
        white-space: nowrap;
        font-weight: 600;
    }

    .filter-device {
        color: var(--muted);
        font-size: 11px;
    }/* ── Category ── */
    .cat-block {
        margin-bottom: 1.5rem;
    }

    .cat-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
        letter-spacing: .06em;
        text-transform: uppercase;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .cat-title::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
    }/* ── Device ── */
    .device-block {
        margin-bottom: 1rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        overflow: hidden;
    }

    .device-header {
        padding: .75rem 1rem;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: .5rem;
        flex-wrap: wrap;
    }

    .device-name {
        font-size: 16px;
        font-weight: 700;
    }

    .device-status {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
    }

    .mini-badge {
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 10px;
        font-weight: 500;
    }/* ── Table ── */
    .parts-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
    }

    .parts-table th:nth-child(1) {
        width: 18%;
    }

    .parts-table th:nth-child(2) {
        width: 8%;
    }

    .parts-table th:nth-child(3) {
        width: 12%;
    }

    .parts-table th:nth-child(4) {
        width: 12%;
    }

    .parts-table th:nth-child(5) {
        width: 16%;
    }

    .parts-table th:nth-child(6) {
        width: 22%;
    }

    .parts-table th:nth-child(7) {
        width: 12%;
    }

    .parts-table td {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .parts-table th {
        font-size: 13px;
        color: var(--muted);
        font-weight: 500;
        padding: 7px 1rem;
        text-align: left;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
    }

    .parts-table td {
        font-size: 13px;
        padding: 9px 1rem;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
    }

    .parts-table tr:last-child td {
        border-bottom: none;
    }

    .parts-table tr:hover td {
        background: #faf9f6;
    }

    .part-name {
        font-weight: 500;
    }

    .part-sub {
        display: block;
        font-size: 10px;
        color: var(--muted);
        margin-top: 2px;
    }

    .part-interval {
        color: var(--muted);
    }

    .date-empty {
        color: var(--muted);
        font-style: italic;
    }

    .dday-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 20px;
        white-space: nowrap;
    }

    .edit-btn {
        font-size: 11px;
        color: var(--muted);
        background: none;
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 3px 8px;
        cursor: pointer;
        margin-right: 4px;
    }

    .edit-btn:hover {
        color: var(--text);
        border-color: var(--border2);
    }

    .hist-btn {
        font-size: 11px;
        color: var(--blue);
        border: 1px solid var(--blue-bg);
        border-radius: 5px;
        padding: 3px 8px;
        cursor: pointer;
        background: var(--blue-bg);
    }

    .hist-btn:hover {
        background: #d0e0f5;
    }

    .note-text {
        font-size: 11px;
        color: var(--muted);
        font-style: italic;
    }

    .mobile-parts {
        display: none;
    }

    .submenu {
        display: none;
        background: #111;
        border-left: 2px solid #333;
    }

    .submenu.open {
        display: block;
    }

    .nav-sub {
        padding: .45rem 1rem .45rem 2rem;
        font-size: 12px;
        color: #bbb;
        cursor: pointer;
        transition: all .15s;
    }

    .nav-sub:hover {
        color: #fff;
        background: #ffffff10;
    }

    .nav-sub.active {
        color: #fff;
        background: #ffffff18;
    }

    .menu-arrow {
        margin-left: auto;
        font-size: 12px;
        color: #666;
        transition: transform .2s;
    }

    .menu-arrow.open {
        transform: rotate(90deg);
    }/* ── Admin ── */
    .admin-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin-bottom: 1.5rem;
    }

    .admin-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 1.1rem 1.25rem;
    }

    .store-badge {
        font-size: 10px;
        font-weight: 600;
        border-radius: 20px;
        padding: 3px 12px;
        display: inline-block;
        margin-bottom: 10px;
    }

    .admin-field {
        margin-bottom: 8px;
    }

    .admin-field label {
        font-size: 10px;
        color: var(--muted);
        display: block;
        margin-bottom: 3px;
    }

    .admin-field input {
        width: 100%;
        font-size: 12px;
        padding: 5px 8px;
        border: 1px solid var(--border);
        border-radius: 5px;
        background: var(--bg);
        color: var(--text);
    }

    .admin-field input:focus {
        outline: none;
        border-color: var(--border2);
    }

    .admin-save-btn {
        width: 100%;
        margin-top: 10px;
        padding: 7px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
    }

    .alert-section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 1.25rem;
    }

    .alert-section h3 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
    }

    .alert-desc {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 1rem;
    }

    .alert-btn {
        padding: 8px 20px;
        background: var(--blue);
        color: #fff;
        border: none;
        border-radius: 20px;
        font-size: 13px;
        cursor: pointer;
        margin-top: 1rem;
    }

    .alert-btn:disabled {
        opacity: .5;
        cursor: not-allowed;
    }

    .alert-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        gap: 8px;
        flex-wrap: wrap;
    }

    .alert-item:last-child {
        border-bottom: none;
    }

    .alert-store {
        font-size: 10px;
        border-radius: 10px;
        padding: 2px 9px;
        white-space: nowrap;
        font-weight: 600;
    }/* ── States ── */
    .state-box {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--muted);
    }

    .spinner {
        width: 24px;
        height: 24px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin .7s linear infinite;
        margin: 0 auto 1rem;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }/* ── Modal ── */
    .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .6);
        z-index: 200;
        align-items: center;
        justify-content: center;
    }

    .overlay.open {
        display: flex;
    }

    .modal {
        background: var(--surface);
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 1.5rem;
        width: 380px;
        max-width: 94vw;
        max-height: 90vh;
        overflow-y: auto;
    }

    .modal h3 {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 3px;
    }

    .modal .msub {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 1.25rem;
    }

    .modal label {
        font-size: 11px;
        color: var(--muted);
        display: block;
        margin-bottom: 4px;
        margin-top: 12px;
    }

    .modal input[type=date], .modal input[type=text], .modal textarea {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 13px;
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
    }

    .modal textarea {
        resize: vertical;
        min-height: 60px;
    }

    .modal input:focus, .modal textarea:focus {
        outline: none;
        border-color: var(--border2);
    }

    .auto-btn {
        margin-top: 8px;
        font-size: 11px;
        padding: 5px 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg);
        cursor: pointer;
    }

    .modal-btns {
        display: flex;
        gap: 8px;
        margin-top: 1.25rem;
    }

    .modal-btns button {
        flex: 1;
        padding: 9px;
        border-radius: 6px;
        border: 1px solid var(--border);
        font-size: 13px;
        cursor: pointer;
    }

    .btn-cancel {
        background: var(--bg);
        color: var(--muted);
    }

    .btn-save {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
        font-weight: 500;
    }

    .btn-save:disabled {
        opacity: .45;
        cursor: not-allowed;
    }

    .saving {
        font-size: 11px;
        color: var(--muted);
        text-align: center;
        margin-top: 6px;
        display: none;
    }

    .hist-item {
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
    }

    .hist-item:last-child {
        border-bottom: none;
    }

    .hist-date {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
    }

    .hist-manager {
        font-size: 12px;
        color: var(--blue);
        margin-top: 2px;
    }

    .hist-memo {
        font-size: 12px;
        color: var(--muted);
        margin-top: 3px;
        font-style: italic;
    }

    .hist-empty {
        font-size: 12px;
        color: var(--muted);
        padding: 1rem 0;
        text-align: center;
    }

    .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%) translateY(60px);
        background: var(--accent);
        color: #fff;
        font-size: 12px;
        padding: 9px 20px;
        border-radius: 20px;
        opacity: 0;
        transition: all .25s;
        z-index: 999;
        pointer-events: none;
        white-space: nowrap;
    }

    .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }/* ── Mobile ── */
    .hamburger {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        font-size: 20px;
        color: var(--text);
    }

    .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .65);
        z-index: 99;
    }

    .sidebar-overlay.open {
        display: block;
    }

    @media (max-width: 768px) {
        .sidebar {
            transform: translateX(-100%);
            transition: transform .25s;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .main {
            margin-left: 0;
        }

        .hamburger {
            display: block;
        }

        .summary {
            grid-template-columns: repeat(2, 1fr);
        }

        .parts-table th:nth-child(2), .parts-table td:nth-child(2), .parts-table th:nth-child(3), .parts-table td:nth-child(3), .parts-table th:nth-child(4), .parts-table td:nth-child(4), .parts-table th:nth-child(6), .parts-table td:nth-child(6) {
            display: none;
        }

        .content {
            padding: 1rem .75rem 4rem;
        }

        .topbar {
            padding: .75rem 1rem;
        }

        .s-num {
            font-size: 26px;
        }

        .s-label {
            font-size: 11px;
        }

        .parts-table th {
            font-size: 12px;
        }

        .parts-table td {
            font-size: 12px;
        }

        .dday-badge {
            font-size: 11px;
        }

        .device-name {
            font-size: 13px !important;
        }

        .filter-item {
            font-size: 12px;
        }

        .device-header {
            flex-direction: column;
            align-items: flex-start;
        }

        .admin-grid {
            grid-template-columns: 1fr;
        }

        .topbar-title {
            font-size: 15px;
        }/* 모바일 카드형 테이블 */

        .parts-table {
            display: none;
        }

        .mobile-parts {
            display: block;
        }
    }
    </style>
</head>
<body>
    <!-- 로그인 화면 -->

    <div class="toast" id="toast"></div>

    <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzIch0hUSfE67NV3LvgDhJdbizbXtbk0JIxfD0RyXWJvchy4T2mvEYKDGm02NjudXAC/exec';
    const STORES = ['본점', '영도', '마린시티', '도모헌'];
    const REPAIR_CATEGORIES = ['전체', '머신', '그라인더', '물 필터 장비', '기타 설비'];

    let activeMode = 'parts'; // 'parts' | 'repair'
    const ADMIN_KEY = 'eq_admins_v1';
    const SESSION_KEY = 'eq_session';
    const UI_STATE_KEY = 'eq_ui_state';
    const SESSION_TTL = 60 * 60 * 1000;

    const STORE_COLORS = {
        '본점': {
            bg: '#1A1916',
            fg: '#FFFFFF'
        },
        '영도': {
            bg: '#1B4F72',
            fg: '#FFFFFF'
        },
        '마린시티': {
            bg: '#1E8449',
            fg: '#FFFFFF'
        },
        '도모헌': {
            bg: '#784212',
            fg: '#FFFFFF'
        },
    };
    function storeBadgeStyle(store) {
        const c = STORE_COLORS[store] || {
            bg: '#e8f0fb',
            fg: '#2d5a8e'
        };
        return `background:${c.bg};color:${c.fg}`;
    }

    let allData = null;
    let activeStore = '대시보드';
    let activeFilter = null;
    let editTarget = null;

    // ── 날짜 유틸 ─────────────────────────────────────────────
    function parseISO(val) {
        if (!val || !String(val).trim())
            return null;
        const m = String(val).trim().match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (!m)
            return null;
        return new Date(+m[1], +m[2] - 1, +m[3]);
    }
    function fmt(iso) {
        const d = parseISO(iso);
        if (!d)
            return '';
        return `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()}`;
    }
    function fmtCost(value) {
        const raw = String(value || '').replace(/[^\d.-]/g, '');
        const num = Number(raw);
        if (!raw || Number.isNaN(num))
            return '';
        return num.toLocaleString('ko-KR');
    }
    function todayISO() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }
    function diffDays(a, b) {
        const da = parseISO(a),
            db = parseISO(b);
        if (!da || !db)
            return null;
        return Math.round((db - da) / 86400000);
    }
    function addDays(iso, n) {
        const d = parseISO(iso);
        if (!d)
            return '';
        d.setDate(d.getDate() + n);
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function status(nextISO) {
        if (!nextISO || !nextISO.trim())
            return {
                cls: 'none',
                days: null
            };
        const d = diffDays(todayISO(), nextISO);
        if (d === null)
            return {
                cls: 'none',
                days: null
            };
        if (d < 0)
            return {
                cls: 'overdue',
                days: Math.abs(d)
            };
        if (d <= 7)
            return {
                cls: 'danger',
                days: d
            };
        if (d <= 30)
            return {
                cls: 'warning',
                days: d
            };
        return {
            cls: 'ok',
            days: d
        };
    }

    function ddayBadge(st) {
        const cfg = {
            ok: {
                bg: '#E8F5E9',
                fg: '#2E7D32',
                icon: '🟢',
                label: '여유'
            },
            warning: {
                bg: '#FFF3E0',
                fg: '#EF6C00',
                icon: '🟠',
                label: '교체 예정'
            },
            danger: {
                bg: '#FDECEA',
                fg: '#C62828',
                icon: '🔴',
                label: '즉시 교체'
            },
            overdue: {
                bg: '#F5F5F5',
                fg: '#616161',
                icon: '⚫',
                label: '지남'
            },
            none: {
                bg: '#FFF8E1',
                fg: '#F57F17',
                icon: '🟡',
                label: '미입력'
            },
        };
        const c = cfg[st.cls] || cfg.none;
        const dayStr = st.days !== null ? ` (${st.days}일)` : '';
        return `<span class="dday-badge" style="background:${c.bg};color:${c.fg};">${c.icon} ${c.label}${dayStr}</span>`;
    }

    function miniBadge(st, label) {
        const cfg = {
            ok: {
                bg: '#E8F5E9',
                fg: '#2E7D32'
            },
            warning: {
                bg: '#FFF3E0',
                fg: '#EF6C00'
            },
            danger: {
                bg: '#FDECEA',
                fg: '#C62828'
            },
            overdue: {
                bg: '#F5F5F5',
                fg: '#616161'
            },
            none: {
                bg: '#FFF8E1',
                fg: '#F57F17'
            },
        };
        const c = cfg[st.cls] || cfg.none;
        return `<span class="mini-badge" style="background:${c.bg};color:${c.fg};">${label}</span>`;
    }

    function loadAdmins() {
        try {
            return JSON.parse(localStorage.getItem(ADMIN_KEY)) || {};
        } catch (e) {
            return {};
        }
    }
    function saveAdmins(d) {
        try {
            localStorage.setItem(ADMIN_KEY, JSON.stringify(d));
        } catch (e) {}
    }
    function getUserStore(user=currentUser) {
        if (!user || user.role === 'admin')
            return '';
        if (user.store && STORES.includes(user.store))
            return user.store;
        const admins = loadAdmins();
        return STORES.find(s => (admins[s] || {}).userId === user.id) || '';
    }

    // ── 사이드바 ──────────────────────────────────────────────
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebar-overlay').classList.toggle('open');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('open');
    }

    // ── 데이터 로딩 ───────────────────────────────────────────
    async function loadData() {
        showLoading();
        try {
            const res = await fetch(`${APPS_SCRIPT_URL}?action=getData`);
            const json = await res.json();
            if (!json.success)
                throw new Error(json.error);
            allData = json.data;
            activeFilter = null;
            render();
        } catch (e) {
            showError(e.message || '데이터를 불러오지 못했습니다.');
        }
    }

    // ── 렌더 ──────────────────────────────────────────────────
    function render() {
        const today = todayISO();
        document.getElementById('date-chip').textContent = `기준 ${fmt(today)}`;
        document.getElementById('sidebar-date').textContent = fmt(today);

        document.getElementById('app').innerHTML = `<div id="store-content"></div>`;
        renderStore();
        updateSidebarActive();
        saveUiState();
    }

    function toggleFilter(cls) {
        activeFilter = (activeFilter === cls) ? null : cls;
        renderStore();
    }

    function renderFilterPanel(items) {
        const labels = {
            danger: '🔴 위험 (D-7 이내)',
            warning: '🟠 주의 (D-30 이내)',
            ok: '🟢 정상',
            none: '🟡 날짜 미입력'
        };
        document.getElementById('filter-panel-title').textContent = `${labels[activeFilter]} — ${items.length}건`;
        if (!items.length) {
            document.getElementById('filter-list').innerHTML = '<div style="font-size:12px;color:var(--muted);">해당 항목 없음</div>';
            return;
        }
        document.getElementById('filter-list').innerHTML = items.map(it => `
    <div class="filter-item">
      <span class="filter-store-badge" style="${
        storeBadgeStyle(it.store)}">${it.store}</span>
      <span style="flex:1;font-weight:500;">${it.part}</span>
      <span class="filter-device">${it.dev}</span>
      ${ddayBadge(it.st)}
    </div>`
        ).join('');
    }

    function renderStore() {
        const el = document.getElementById('store-content');
        if (activeStore === '대시보드') {
            el.innerHTML = renderDashboard();
            return;
        }
        if (activeStore === '매장별담당자' && activeMode === 'settings') {
            el.innerHTML = renderMySettings();
            return;
        }
        if (activeStore === '매장별담당자') {
            el.innerHTML = renderStoreManagers();
            return;
        }
        if (activeStore === '알림발송') {
            el.innerHTML = renderAlertSend();
            return;
        }
        if (activeStore === '시스템관리자') {
            el.innerHTML = renderSysAdmin();
            return;
        }
        if (STORES.includes(activeStore) && activeMode === 'repair') {
            renderRepairPage();
            return;
        }
        const sd = allData[activeStore] || {};
        if (!Object.keys(sd).length) {
            el.innerHTML = '<div class="state-box"><p>데이터가 없습니다.</p></div>';
            return;
        }
        el.innerHTML = Object.entries(sd).map(([cat, devices]) => `
    <div class="cat-block">
      <div class="cat-title">${
        cat}</div>
      ${Object.entries(devices).map(([dev, parts]) => renderDevice(dev, parts)).join('')}
    </div>
  `

        ).join('');
    }

    // ── 대시보드 ──────────────────────────────────────────────
    function renderDashboard() {
        const counts = {
            danger: 0,
            warning: 0,
            ok: 0,
            none: 0
        };
        const items = {
            danger: [],
            warning: [],
            ok: [],
            none: []
        };
        const storeCounts = {};
        STORES.forEach(store => {
            storeCounts[store] = {
                total: 0,
                danger: 0,
                warning: 0,
                ok: 0,
                none: 0
            };
            Object.values(allData[store] || {}).forEach(cat =>
            Object.entries(cat).forEach(([dev, parts]) =>
            parts.forEach(p => {
                const st = status(p.next);
                const cls = st.cls === 'overdue' ? 'danger' : st.cls;
                counts[cls]++;
                storeCounts[store].total++;
                storeCounts[store][cls]++;
                items[cls].push({
                    store,
                    dev,
                    part: p.part,
                    next: p.next,
                    st
                });
            })
            )
            );
        });

        // 매장별 현황 바
        const storeRows = STORES.map(s => {
            const sc = STORE_COLORS[s] || {
                bg: '#1a1916',
                fg: '#fff'
            };
            const st = storeCounts[s];
            const total = st.total || 1;
            const dangerPct = Math.round(st.danger / total * 100);
            const warnPct = Math.round(st.warning / total * 100);
            const okPct = Math.round(st.ok / total * 100);
            const nonePct = Math.round(st.none / total * 100);
            return `
      <div style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);flex-wrap:nowrap;">
        <span style="font-size:12px;font-weight:600;border-radius:10px;padding:3px 12px;white-space:nowrap;background:${
            sc.bg};color:${sc.fg};min-width:72px;text-align:center;">${s}</span>
        <div style="flex:1;min-width:0;height:10px;border-radius:10px;overflow:hidden;background:#f0eeea;display:flex;">
          ${
            st.danger > 0 ? `<div style="width:${dangerPct}%;background:#C62828;"></div>` : ''}
          ${st.warning > 0 ? `<div style="width:${warnPct}%;background:#EF6C00;"></div>` : ''}
          ${st.ok > 0 ? `<div style="width:${okPct}%;background:#2E7D32;"></div>` : ''}
          ${st.none > 0 ? `<div style="width:${nonePct}%;background:#ccc;"></div>` : ''}
        </div>
        <div style="display:flex;gap:16px;font-size:13px;font-family:var(--mono);white-space:nowrap;">
          ${

            st.danger > 0 ? `<span style="color:#C62828;">🔴 ${st.danger}</span>` : ''}
          ${st.warning > 0 ? `<span style="color:#EF6C00;">🟠 ${st.warning}</span>` : ''}
          ${st.ok > 0 ? `<span style="color:#2E7D32;">🟢 ${st.ok}</span>` : ''}
          ${st.none > 0 ? `<span style="color:#aaa;">🟡 ${st.none}</span>` : ''}
        </div>
        <span style="font-size:12px;color:var(--muted);white-space:nowrap;margin-left:auto;">${
            st.total}개</span>
      </div>`
            ;
        }).join('');

        // 지남 항목만 표시
        const overdueItems = [];
        STORES.forEach(store => {
            Object.values(allData[store] || {}).forEach(cat =>
            Object.entries(cat).forEach(([dev, parts]) =>
            parts.forEach(p => {
                const st = status(p.next);
                if (st.cls === 'overdue')
                    overdueItems.push({
                        store,
                        dev,
                        part: p.part,
                        next: p.next,
                        st
                    });
            })
            )
            );
        });
        overdueItems.sort((a, b) => b.st.days - a.st.days);

        const overdueTable = overdueItems.length === 0
        ? '<p style="font-size:12px;color:var(--muted);padding:.75rem 0;">교체일 경과 항목 없음 ✓</p>'
        : `<table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:var(--surface2);">
            <th style="font-size:13px;color:var(--muted);font-weight:500;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);">매장</th>
            <th style="font-size:13px;color:var(--muted);font-weight:500;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);">부품명</th>
            <th style="font-size:13px;color:var(--muted);font-weight:500;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);">장비명</th>
            <th style="font-size:13px;color:var(--muted);font-weight:500;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);">경과</th>
          </tr>
        </thead>
        <tbody>
          ${








        overdueItems.map((it, i) => `
            <tr style="background:${i % 2 === 0 ? 'var(--surface)' : 'var(--surface2)'};cursor:pointer;" onclick="selectStore('${it.store}')">
              <td style="padding:7px 8px;border-bottom:1px solid var(--border);">
                <span style="font-size:12px;font-weight:600;border-radius:8px;padding:2px 8px;white-space:nowrap;${
        storeBadgeStyle(it.store)}">${it.store}</span>
              </td>
              <td style="padding:7px 8px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;white-space:nowrap;">${
        it.part}</td>
              <td style="padding:7px 8px;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${it.dev}</td>
              <td style="padding:7px 8px;border-bottom:1px solid var(--border);">
                <span style="font-size:13px;font-weight:700;background:#F5F5F5;color:#616161;padding:2px 8px;border-radius:10px;white-space:nowrap;">⚫ ${
        it.st.days}일 경과</span>
              </td>
            </tr>`
        ).join('')}
        </tbody>
      </table>`

        ;

        const filterHtml = activeFilter ? `
    <div class="filter-panel open" id="filter-panel" style="margin-top:1rem;">
      <div class="filter-panel-title">
        <span id="filter-panel-title"></span>
        <button class="filter-close" onclick="toggleFilter(null)">✕ 닫기</button>
      </div>
      <div class="filter-list" id="filter-list"></div>
    </div>`






        : `
    <div class="filter-panel" id="filter-panel" style="margin-top:1rem;">
      <div class="filter-panel-title">
        <span id="filter-panel-title"></span>
        <button class="filter-close" onclick="toggleFilter(null)">✕ 닫기</button>
      </div>
      <div class="filter-list" id="filter-list"></div>
    </div>`






        ;

        const total = counts.danger + counts.warning + counts.ok + counts.none;
        const html = `

    async function postWithActionFallback(actions, payload) {
        let lastJson = null;
        for (const action of actions) {
            const res = await fetch(`${APPS_SCRIPT_URL}?action=${encodeURIComponent(action)}`, {
                method: 'POST',
                body: JSON.stringify({
                    ...payload,
                    action
                })
            });
            const json = await res.json();
            lastJson = json;
            const message = String(json.error || json.message || '').toLowerCase();
            const isUnknownAction = json.success === false && message.includes('unknown action');
            if (!isUnknownAction)
                return json;
        }
        return lastJson;
    }

    async function saveRepair() {
        const date = document.getElementById('r-date').value;
        const cat = document.getElementById('r-cat').value;
        const device = document.getElementById('r-device').value.trim();
        const cause = document.getElementById('r-cause').value.trim();
        const content = document.getElementById('r-content').value.trim();
        const cost = document.getElementById('r-cost').value.replace(/[^\d.-]/g, '').trim();
        const manager = document.getElementById('r-manager').value.trim();
        if (!date || !device) {
            showToast('날짜와 설비명은 필수입니다.');
            return;
        }
        document.getElementById('r-saving').style.display = 'block';
        try {
            const payload = {
                id: editingRepairId,
                rowIndex: editingRepairId,
                store: activeStore,
                category: cat,
                device,
                date,
                cause,
                content,
                cost,
                manager
            };
            const json = editingRepairId
                ? await postWithActionFallback(['updateRepair', 'editRepair'], payload)
                : await postWithActionFallback(['addRepair', 'saveRepair', 'createRepair'], payload);
            if (!json.success)
                throw new Error(json.error);
            const wasEditing = Boolean(editingRepairId);
            closeRepairModal();
            showToast(wasEditing ? '수리 이력이 수정되었습니다 ✓' : '수리 이력이 추가되었습니다 ✓');

            document.getElementById('r-saving').style.display = 'none';
            showToast('저장 실패: ' + e.message);
        }
    }

    async function sendAlerts() {
        const admins = loadAdmins();
        const btn = document.getElementById('send-btn');
        if (btn) {
            btn.disabled = true;
            btn.textContent = '발송 중...';
        }
        const byStore = {};
        STORES.forEach(store => Object.values(allData[store] || {}).forEach(cat =>
        Object.values(cat).forEach(dev => dev.forEach(p => {
            const d = diffDays(todayISO(), p.next);
            if (d !== null && d >= 0 && d <= 30) {
                if (!byStore[store])
                    byStore[store] = [];
                byStore[store].push({
                    part: p.part,
                    next: p.next,
                    dday: d
                });
            }
        }))
        ));
        let sent = 0,
            failed = 0;
        for (const [store, parts] of Object.entries(byStore)) {
            const admin = admins[store];
            if (!admin?.email) {
                failed++;
                continue;
            }
            const partLines = parts.map(p =>
            `교체해야 할 부품명 : ${p.part}\n만료 예정일 : ${fmt(p.next)}\n남은 기간 : D-${p.dday}`
            ).join('\n\n');
            try {
                const res = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'sendMail',
                        to: admin.email,
                        subject: '[확인 요청] 장비 부품 교체 주기 경과 예정 안내',
                        body: `안녕하세요, 매장에서 사용 중인 장비의 부품 교체 시기가 도래하여 확인 요청드립니다.\n\n${partLines}\n\n감사합니다.`
                    })
                });
                const json = await res.json();
                if (json.success)
                    sent++;
                else
                    failed++;
            } catch (e) {
                failed++;
            }
        }
        showToast(`발송 완료 ${sent}건${failed > 0 ? ' / 실패 ' + failed + '건' : ''}`);
        if (btn) {
            btn.disabled = false;
            btn.textContent = '메일 발송';
        }
    }

    function updateSidebarActive() {
        document.querySelectorAll('.nav-store,.nav-item').forEach(el => {
            el.classList.toggle('active', el.dataset.store === activeStore && !STORES.includes(activeStore));
        });
        document.querySelectorAll('.nav-sub').forEach(el => {
            el.classList.toggle('active',
            el.dataset.store === activeStore && el.dataset.mode === activeMode
            );
        });
    }

    function openModal(store, dev, part, interval, last, next) {
        editTarget = {
            store,
            dev,
            part,
            interval
        };
        document.getElementById('m-title').textContent = part;
        document.getElementById('m-sub').textContent = `${store} · ${dev} · ${interval}개월 주기`;
        document.getElementById('m-last').value = last || '';
        document.getElementById('m-next').value = next || '';
        document.getElementById('m-manager').value = '';
        document.getElementById('m-memo').value = '';
        document.getElementById('m-save').disabled = false;
        document.getElementById('m-saving').style.display = 'none';
        document.getElementById('modal').classList.add('open');
    }
    function closeModal() {
        document.getElementById('modal').classList.remove('open');
        editTarget = null;
    }
    function autoCalc() {
        const last = document.getElementById('m-last').value;
        if (!last || !editTarget)
            return;
        document.getElementById('m-next').value = addDays(last, editTarget.interval * 30);
    }
    async function saveModal() {
        if (!editTarget)
            return;
        const last = document.getElementById('m-last').value;
        const next = document.getElementById('m-next').value;
        const manager = document.getElementById('m-manager').value.trim();
        const memo = document.getElementById('m-memo').value.trim();
        document.getElementById('m-save').disabled = true;
        document.getElementById('m-saving').style.display = 'block';
        try {
            const res = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'updateRow',
                    store: editTarget.store,
                    device: editTarget.dev,
                    part: editTarget.part,
                    last,
                    next,
                    manager,
                    memo
                })
            });
            const json = await res.json();
            if (!json.success)
                throw new Error(json.error);
            Object.values(allData[editTarget.store] || {}).forEach(cat => {
                if (cat[editTarget.dev])
                    cat[editTarget.dev].forEach(p => {
                        if (p.part === editTarget.part) {
                            p.last = last;
                            p.next = next;
                        }
                    });
            });
            closeModal();
            render();
            showToast('저장 완료 ✓');
        } catch (e) {
            document.getElementById('m-save').disabled = false;
            document.getElementById('m-saving').style.display = 'none';
            showToast('저장 실패: ' + e.message);
        }
    }

    async function openHistModal(store, dev, part) {
        document.getElementById('h-title').textContent = part;
        document.getElementById('h-sub').textContent = `${store} · ${dev}`;
        document.getElementById('h-loading').style.display = 'block';
        document.getElementById('h-list').style.display = 'none';
        document.getElementById('hist-modal').classList.add('open');
        try {
            const url = `${APPS_SCRIPT_URL}?action=getHistory&store=${encodeURIComponent(store)}&device=${encodeURIComponent(dev)}&part=${encodeURIComponent(part)}`;
            const res = await fetch(url);
            const json = await res.json();
            const list = document.getElementById('h-list');
            if (!json.success || !json.history.length) {
                list.innerHTML = '<div class="hist-empty">아직 교체 이력이 없습니다.</div>';
            } else {
                list.innerHTML = json.history.map(h => `
        <div class="hist-item">
          <div class="hist-date">${
                fmt(h.date)}</div>
          ${h.manager ? `<div class="hist-manager">담당자: ${h.manager}</div>` : ''}
          ${h.memo ? `<div class="hist-memo">${h.memo}</div>` : ''}
        </div>`
                ).join('');
            }
            document.getElementById('h-loading').style.display = 'none';
            list.style.display = 'block';
        } catch (e) {
            document.getElementById('h-list').innerHTML = `<div class="hist-empty">불러오기 실패: ${e.message}</div>`;
            document.getElementById('h-loading').style.display = 'none';
            document.getElementById('h-list').style.display = 'block';
        }
    }
    function closeHistModal() {
        document.getElementById('hist-modal').classList.remove('open');
    }

    const esc = s => String(s).replace(/'/g, "\\'");
    const escAttr = s => String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const escText = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    function showLoading() {
        document.getElementById('app').innerHTML = '<div class="state-box"><div class="spinner"></div><p>불러오는 중...</p></div>';
    }
    function showError(m) {
        const detail = m === 'Failed to fetch'
            ? '서버에 연결하지 못했습니다. Apps Script 배포 권한과 배포 URL을 확인해주세요.'
            : m;
        document.getElementById('app').innerHTML = `<div class="state-box"><p>로딩 실패<br><small>${detail}</small></p></div>`;
    }
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }

    // ── 사용자 관리 ──────────────────────────────────────────
    const USER_KEY = 'eq_users_v1';
    const DEFAULT_ADMIN = {
        id: 'admin',
        pw: 'momos2007',
        name: '이언주',
        email: 'eonju51@momos.co.kr',
        role: 'admin'
    };
    let currentUser = null;

    function getUsers() {
        try {
            const u = JSON.parse(localStorage.getItem(USER_KEY));
            if (!u || !u.length)
                return [DEFAULT_ADMIN];
            // admin 계정 항상 포함
            if (!u.find(x => x.id === 'admin'))
                u.unshift(DEFAULT_ADMIN);
            return u;
        } catch (e) {
            return [DEFAULT_ADMIN];
        }
    }
    function saveUsers(users) {
        try {
            localStorage.setItem(USER_KEY, JSON.stringify(users));
        } catch (e) {}
    }

    function saveUiState() {
        try {
            localStorage.setItem(UI_STATE_KEY, JSON.stringify({
                activeStore,
                activeMode,
                activeFilter
            }));
        } catch (e) {}
    }

    function restoreUiState() {
        try {
            const state = JSON.parse(localStorage.getItem(UI_STATE_KEY));
            if (!state)
                return;
            if (state.activeStore)
                activeStore = state.activeStore;
            if (state.activeMode)
                activeMode = state.activeMode;
            if ('activeFilter' in state)
                activeFilter = state.activeFilter;
        } catch (e) {}
    }

    function syncTitleFromState() {
        const titles = {
            '대시보드': '대시보드',
            '매장별담당자': activeMode === 'settings' ? '담당자 설정' : '매장별 담당자',
            '알림발송': '알림 발송',
            '시스템관리자': '시스템 관리자'
        };
        const modeLabel = activeMode === 'repair' ? ' · 수리 이력' : ' · 부품 교체';
        document.getElementById('topbar-title').textContent = STORES.includes(activeStore)
            ? activeStore + modeLabel
            : (titles[activeStore] || activeStore);
    }

    function restoreSession() {
        try {
            const session = JSON.parse(localStorage.getItem(SESSION_KEY));
            if (!session || !session.userId || Date.now() > session.expiry) {
                localStorage.removeItem(SESSION_KEY);
                return false;
            }

            const user = getUsers().find(u => u.id === session.userId);
            if (!user) {
                localStorage.removeItem(SESSION_KEY);
                return false;
            }

            currentUser = user;
            localStorage.setItem(SESSION_KEY, JSON.stringify({
                userId: user.id,
                expiry: Date.now() + SESSION_TTL
            }));
            restoreUiState();
            syncTitleFromState();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('login-error').style.display = 'none';
            loadData();
            return true;
        } catch (e) {
            return false;
        }
    }

    function doLogin() {
        const id = document.getElementById('login-id').value.trim();
        const pw = document.getElementById('login-pw').value;
        const users = getUsers();
        const user = users.find(u => u.id === id && u.pw === pw);
        if (user) {
            currentUser = user;
            // 24시간 자동 로그인 저장
            const session = {
                userId: user.id,
                expiry: Date.now() + SESSION_TTL
            };
            try {
                localStorage.setItem(SESSION_KEY, JSON.stringify(session));
            } catch (e) {}
            saveUiState();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('login-error').style.display = 'none';
            loadData();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function doLogout() {
        currentUser = null;
        try {
            localStorage.removeItem(SESSION_KEY);
            localStorage.removeItem(UI_STATE_KEY);
        } catch (e) {}
        document.getElementById('login-id').value = '';
        document.getElementById('login-pw').value = '';
        document.getElementById('login-error').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        activeStore = '대시보드';
        activeMode = 'parts';
        activeFilter = null;
        document.getElementById('topbar-title').textContent = '대시보드';
        closeSidebar();
    }

    document.getElementById('modal').addEventListener('click', e => {
        if (e.target === e.currentTarget)
            closeModal();
    });
    document.getElementById('hist-modal').addEventListener('click', e => {
        if (e.target === e.currentTarget)
            closeHistModal();
    });

    if (!restoreSession()) {
        document.getElementById('login-screen').style.display = 'flex';
    }
    </script>
</body>
</html>
